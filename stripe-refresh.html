<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enlace expirado — Pawnder</title>
    <meta name="description" content="El enlace de registro expiró. Genera uno nuevo desde la app Pawnder.">
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { pawnder: { 50: '#FFF7ED', 100: '#FFEDD5', 500: '#F97316', 600: '#EA580C' } } } } }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', -apple-system, system-ui, sans-serif; }</style>
</head>
<body class="bg-white text-gray-900">

    <main class="max-w-xl mx-auto px-6 py-20 text-center">
        <img src="logo.png" alt="Pawnder" class="h-24 w-auto mx-auto mb-8">

        <div class="text-6xl mb-6">⏰</div>
        <h1 class="text-3xl md:text-4xl font-extrabold mb-4">El enlace expiró</h1>
        <p class="text-lg text-gray-600 mb-10">
            Por seguridad, los enlaces de registro de Stripe caducan en unos minutos.
            Vuelve a la app Pawnder y toca <strong>"Conectar mi cuenta"</strong> de nuevo
            para generar uno nuevo.
        </p>

        <a href="pawnder://stripe-redirect"
           class="inline-block bg-gray-900 text-white px-8 py-4 rounded-2xl font-semibold hover:bg-gray-800 transition mb-6">
            🐾 Volver a Pawnder
        </a>

        <p class="text-sm text-gray-400">
            Si el botón no abre la app, ciérrala y ábrela de nuevo manualmente.
        </p>
    </main>

</body>
</html>
